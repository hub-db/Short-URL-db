<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Link wird geöffnet</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fafc;
      background: #070b14;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 15% 20%, rgba(37, 99, 235, .24), transparent 34rem),
        radial-gradient(circle at 85% 80%, rgba(124, 58, 237, .18), transparent 32rem),
        #070b14;
    }

    main {
      width: min(100%, 520px);
      padding: 34px;
      text-align: center;
      background: rgba(15, 23, 42, .78);
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .4);
      backdrop-filter: blur(18px);
    }

    .spinner {
      width: 46px;
      height: 46px;
      margin: 0 auto 22px;
      border: 4px solid rgba(148, 163, 184, .2);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .spinner.done { animation: none; border-color: #34d399; }
    .spinner.error { animation: none; border-color: #fb7185; }

    h1 { margin: 0 0 10px; font-size: clamp(1.45rem, 5vw, 2rem); }
    p { margin: 0; color: #aebbd0; line-height: 1.55; }

    button {
      margin-top: 24px;
      padding: 12px 19px;
      color: white;
      background: #2563eb;
      border: 0;
      border-radius: 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: #3b82f6; }
    [hidden] { display: none !important; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div class="spinner" id="indicator" aria-hidden="true"></div>
    <h1 id="title">Inhalt wird entschlüsselt</h1>
    <p id="status" role="status">Bitte einen Moment warten …</p>
    <button id="openButton" type="button" hidden>In neuem Tab öffnen</button>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
